<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Great Things</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08070f; overflow: hidden; width: 100vw; height: 100vh; }

    .corner {
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      pointer-events: none;
    }
    .tl { top: -120px; left: -120px; background: radial-gradient(circle, rgba(180,160,255,0.18) 0%, rgba(120,100,220,0.08) 45%, transparent 70%); }
    .tr { top: -120px; right: -120px; background: radial-gradient(circle, rgba(180,160,255,0.18) 0%, rgba(120,100,220,0.08) 45%, transparent 70%); }
    .bl { bottom: -120px; left: -120px; background: radial-gradient(circle, rgba(180,160,255,0.18) 0%, rgba(120,100,220,0.08) 45%, transparent 70%); }
    .br { bottom: -120px; right: -120px; background: radial-gradient(circle, rgba(180,160,255,0.18) 0%, rgba(120,100,220,0.08) 45%, transparent 70%); }

    .center-text {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .center-text p {
      font-family: Georgia, serif;
      font-size: clamp(18px, 3.2vw, 42px);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      letter-spacing: 0.04em;
      line-height: 1.5;
      padding: 0 2rem;
      text-shadow: 0 2px 32px rgba(180, 160, 255, 0.25);
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="center-text">
    <p>We're going to make great things together</p>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, dots = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      canvas.style.position = 'fixed';
      canvas.style.top = '0';
      canvas.style.left = '0';
      canvas.style.width = '100%';
      canvas.style.height = '100%';
    }

    function createDots(n) {
      dots = [];
      for (let i = 0; i < n; i++) {
        dots.push({
          x: Math.random() * W,
          y: Math.random() * H,
          baseY: 0,
          r: Math.random() * 1.5 + 0.4,
          speed: Math.random() * 0.004 + 0.002,
          amp: Math.random() * 28 + 10,
          phase: Math.random() * Math.PI * 2,
          alpha: Math.random() * 0.45 + 0.08,
          drift: (Math.random() - 0.5) * 0.12
        });
        dots[dots.length - 1].baseY = dots[dots.length - 1].y;
      }
    }

    resize();
    createDots(220);
    window.addEventListener('resize', () => { resize(); createDots(220); });

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#08070f';
      ctx.fillRect(0, 0, W, H);
      t += 0.012;

      for (let d of dots) {
        d.x += d.drift;
        if (d.x > W + 4) d.x = -4;
        if (d.x < -4) d.x = W + 4;

        const wave = Math.sin(t * d.speed * 80 + d.phase + d.x * 0.012) * d.amp;
        const y = d.baseY + wave;

        const edgeFadeX = Math.min(d.x / 80, 1) * Math.min((W - d.x) / 80, 1);
        const edgeFadeY = Math.min(y / 80, 1) * Math.min((H - y) / 80, 1);
        const fade = Math.max(0, Math.min(1, edgeFadeX * edgeFadeY));

        ctx.beginPath();
        ctx.arc(d.x, y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,215,255,${d.alpha * fade})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
