<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WLNG</title>
<link rel="icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111116;
  --panel:#1c1c24;
  --panel2:#212230;
  --border:#2c2c38;
  --text:#eae8f0;
  --muted:#8d8a98;
  --accent:#b89bff;
  --accent-soft:rgba(184,155,255,.14);
  --pink:#ff9fc0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(circle at 20% -10%, #1d1d27 0%, var(--bg) 45%) fixed;
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding-bottom:80px;
}
h1,h2,.brand,.copy-btn,.download-btn,.back-btn,.main-btn-label,.sub-btn-label{font-family:'Space Grotesk',sans-serif;}

.discord-btn{
  position:fixed;
  top:18px;
  right:18px;
  z-index:200;
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  padding:9px 16px 9px 12px;
  border-radius:999px;
  transition:all .25s ease;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
}
.discord-btn:hover{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent-soft), 0 6px 18px rgba(184,155,255,.18);
  transform:translateY(-1px);
}
.discord-btn svg{width:18px;height:18px;fill:var(--accent);}

.brand-home{
  position:fixed;
  top:18px;
  left:18px;
  z-index:200;
  font-size:18px;
  font-weight:700;
  letter-spacing:.5px;
  cursor:pointer;
  user-select:none;
  background:var(--panel2);
  border:1px solid var(--border);
  padding:9px 16px;
  border-radius:999px;
  transition:all .25s ease;
}
.brand-home span{color:var(--accent);}
.brand-home:hover{border-color:var(--accent);transform:translateY(-1px);}

main{
  max-width:1100px;
  margin:0 auto;
  padding:100px 6vw 0;
}

#app{transition:opacity .22s ease, transform .22s ease;}
#app.leaving{opacity:0;transform:translateY(10px);}

#status{
  padding:60px 0;
  text-align:center;
  color:var(--muted);
  font-size:13px;
  letter-spacing:.5px;
}
.status-error{color:var(--pink);}

.reveal{opacity:0;transform:translateY(16px);transition:opacity .45s ease, transform .45s ease;}
.reveal.in{opacity:1;transform:translateY(0);}

.home-screen{
  display:flex;
  gap:24px;
  justify-content:center;
  align-items:center;
  min-height:60vh;
  flex-wrap:wrap;
}
.main-btn{
  width:240px;
  height:240px;
  background:var(--panel);
  border:1px solid var(--border);
  clip-path:polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 0 100%, 0 18px);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:border-color .25s ease, box-shadow .25s ease, transform .25s ease, opacity .45s ease;
}
.main-btn:hover{
  border-color:var(--accent);
  box-shadow:0 10px 26px rgba(0,0,0,.4), 0 0 0 1px var(--accent-soft);
  transform:translateY(-4px) scale(1.02);
}
.main-btn-label{font-size:24px;font-weight:700;color:var(--text);letter-spacing:1px;}

.view-wrap{padding:0 0 40px;}
.back-btn{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  font-size:13px;
  font-weight:600;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:20px;
  transition:all .2s ease;
}
.back-btn:hover{color:var(--accent);border-color:var(--accent);}

.view-title{font-size:24px;font-weight:600;margin-bottom:22px;}

.category-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
  gap:16px;
}
.sub-btn{
  background:var(--panel);
  border:1px solid var(--border);
  clip-path:polygon(14px 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%, 0 14px);
  padding:26px 16px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  transition:border-color .25s ease, box-shadow .25s ease, transform .25s ease, opacity .45s ease;
}
.sub-btn:hover{
  border-color:var(--accent);
  box-shadow:0 10px 26px rgba(0,0,0,.4), 0 0 0 1px var(--accent-soft);
  transform:translateY(-3px);
}
.sub-btn-label{font-size:15px;font-weight:600;color:var(--text);}
.sub-btn-count{font-size:11px;color:var(--muted);}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:18px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  clip-path:polygon(14px 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%, 0 14px);
  overflow:hidden;
  transition:opacity .45s ease, transform .45s ease, box-shadow .25s ease, border-color .25s ease;
}
.card:hover{
  transform:translateY(-4px) scale(1.015);
  border-color:var(--accent);
  box-shadow:0 10px 26px rgba(0,0,0,.4), 0 0 0 1px var(--accent-soft);
}

.embed-wrap{
  width:100%;
  aspect-ratio:1/1;
  background:linear-gradient(145deg, #1d1d27, #15151b);
  overflow:hidden;
}
.embed-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform .4s ease;
}
.card:hover .embed-wrap img{transform:scale(1.06);}

.card-body{
  padding:12px 14px 14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.media-name{
  font-size:13px;
  color:var(--text);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.btn-row{display:flex;gap:8px;}

.copy-btn, .download-btn{
  flex:1;
  font-size:11px;
  font-weight:600;
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--border);
  padding:7px 10px;
  border-radius:7px;
  cursor:pointer;
  transition:all .2s ease;
}
.copy-btn:hover, .download-btn:hover{
  border-color:var(--accent);
  background:var(--accent-soft);
  color:var(--accent);
}
.copy-btn.copied{
  border-color:var(--pink);
  color:var(--pink);
  background:rgba(255,159,192,.1);
}
</style>
</head>
<body>

<a class="discord-btn" href="https://discord.gg/your-invite" target="_blank" rel="noopener">
<svg viewBox="0 0 24 24"><path d="M20.317 4.369A19.791 19.791 0 0016.558 3c-.21.375-.444.875-.608 1.273a18.27 18.27 0 00-7.9 0C7.886 3.875 7.65 3.375 7.44 3a19.736 19.736 0 00-3.76 1.37C1.5 8.03.9 11.6 1.2 15.117a19.9 19.9 0 006.073 3.075c.49-.67.927-1.382 1.304-2.13-.717-.27-1.404-.6-2.054-.984.172-.126.34-.258.503-.395a14.16 14.16 0 0012.04 0c.164.137.331.27.503.395-.65.385-1.337.715-2.054.985a16.5 16.5 0 001.304 2.13 19.83 19.83 0 006.077-3.076c.36-4.08-.61-7.61-2.58-10.748zM8.68 13.33c-.83 0-1.51-.77-1.51-1.72 0-.95.665-1.72 1.51-1.72.853 0 1.526.78 1.51 1.72 0 .95-.657 1.72-1.51 1.72zm6.64 0c-.83 0-1.51-.77-1.51-1.72 0-.95.665-1.72 1.51-1.72.853 0 1.526.78 1.51 1.72 0 .95-.65 1.72-1.51 1.72z"/></svg>
Discord
</a>

<div class="brand-home" data-action="home-brand">WLNG<span>.</span></div>

<main>
  <div id="app">
    <div id="status">loading repo contents...</div>
  </div>
</main>

<script>
const CONFIG = {
  owner: "archeville",
  repo: "WLNG",
  branch: "main"
};

const state = { tree: null };

function cdnUrl(path){
  return `https://cdn.jsdelivr.net/gh/${CONFIG.owner}/${CONFIG.repo}@${CONFIG.branch}/${path.split("/").map(encodeURIComponent).join("/")}`;
}

async function fetchFlatFileList(){
  const url = `https://data.jsdelivr.com/v1/packages/gh/${CONFIG.owner}/${CONFIG.repo}@${CONFIG.branch}?structure=flat`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`${res.status} fetching file list`);
  const data = await res.json();
  return data.files || [];
}

function buildTree(files){
  const tree = {};
  files.forEach(f => {
    const path = f.name.replace(/^\//, "");
    const parts = path.split("/");
    if(parts.length < 3) return;
    const top = parts[0];
    const sub = parts[1];
    const filename = parts.slice(2).join("/");
    if(top !== "gif" && top !== "pfp") return;
    tree[top] = tree[top] || {};
    tree[top][sub] = tree[top][sub] || [];
    tree[top][sub].push(filename);
  });
  return tree;
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function titleize(str){
  return String(str).replace(/\.[a-zA-Z0-9]+$/,"").replace(/[-_]+/g," ").trim().replace(/\b\w/g, c => c.toUpperCase());
}

async function downloadFile(url, filename){
  try{
    const res = await fetch(url);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(blobUrl);
  }catch(e){
    console.error("download failed", e);
    window.open(url, "_blank");
  }
}

function revealStagger(elements){
  elements.forEach((el, i) => {
    el.style.transitionDelay = `${Math.min(i * 40, 400)}ms`;
  });
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      elements.forEach(el => el.classList.add("in"));
    });
  });
}

function transitionTo(renderFn){
  const app = document.getElementById("app");
  app.classList.add("leaving");
  setTimeout(() => {
    app.innerHTML = "";
    renderFn(app);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => app.classList.remove("leaving"));
    });
  }, 220);
}

function extFor(main){
  return main === "gif" ? /\.gif$/i : /\.png$/i;
}

function renderHome(app){
  app.innerHTML = `
    <div class="home-screen">
      <button class="main-btn reveal" data-main="gif">
        <span class="main-btn-label">Gifs</span>
      </button>
      <button class="main-btn reveal" data-main="pfp">
        <span class="main-btn-label">Pfp</span>
      </button>
    </div>
  `;
  revealStagger([...app.querySelectorAll(".reveal")]);
}

function renderCategory(app, main){
  const tree = state.tree;
  const subfolders = Object.keys(tree[main] || {});
  const title = main === "gif" ? "Gifs" : "Pfp";
  const ext = extFor(main);

  const wrap = document.createElement("div");
  wrap.className = "view-wrap";
  wrap.innerHTML = `
    <button class="back-btn" data-action="home">&larr; Home</button>
    <h2 class="view-title">${title}</h2>
    <div class="category-grid"></div>
  `;
  const grid = wrap.querySelector(".category-grid");

  subfolders.forEach(sub => {
    const count = (tree[main][sub] || []).filter(f => ext.test(f)).length;
    if(!count) return;
    const btn = document.createElement("button");
    btn.className = "sub-btn reveal";
    btn.dataset.main = main;
    btn.dataset.sub = sub;
    btn.innerHTML = `
      <span class="sub-btn-label">${escapeHtml(titleize(sub))}</span>
      <span class="sub-btn-count">${count}</span>
    `;
    grid.appendChild(btn);
  });

  app.appendChild(wrap);
  revealStagger([...wrap.querySelectorAll(".reveal")]);
}

function makeMediaCard(filename, cdnSrc){
  const card = document.createElement("div");
  card.className = "card reveal";
  const caption = titleize(filename);
  card.innerHTML = `
    <div class="embed-wrap">
      <img src="${escapeHtml(cdnSrc)}" loading="lazy" alt="${escapeHtml(caption)}">
    </div>
    <div class="card-body">
      <span class="media-name">${escapeHtml(caption)}</span>
      <div class="btn-row">
        <button class="copy-btn" data-copy="${escapeHtml(cdnSrc)}">Copy</button>
        <button class="download-btn" data-url="${escapeHtml(cdnSrc)}" data-filename="${escapeHtml(filename)}">Download</button>
      </div>
    </div>
  `;
  return card;
}

function renderGrid(app, main, sub){
  const tree = state.tree;
  const ext = extFor(main);
  const files = (tree[main][sub] || []).filter(f => ext.test(f));

  const wrap = document.createElement("div");
  wrap.className = "view-wrap";
  wrap.innerHTML = `
    <button class="back-btn" data-action="category" data-main="${main}">&larr; ${main === "gif" ? "Gifs" : "Pfp"}</button>
    <h2 class="view-title">${escapeHtml(titleize(sub))}</h2>
    <div class="grid"></div>
  `;
  const grid = wrap.querySelector(".grid");

  files.forEach(filename => {
    const cdnSrc = cdnUrl(`${main}/${sub}/${filename}`);
    grid.appendChild(makeMediaCard(filename, cdnSrc));
  });

  app.appendChild(wrap);
  revealStagger([...grid.children]);
}

document.addEventListener("click", (e) => {
  const copyBtn = e.target.closest(".copy-btn");
  if(copyBtn){
    const value = copyBtn.getAttribute("data-copy");
    navigator.clipboard.writeText(value).then(() => {
      const original = copyBtn.textContent;
      copyBtn.textContent = "Copied";
      copyBtn.classList.add("copied");
      setTimeout(() => {
        copyBtn.textContent = original;
        copyBtn.classList.remove("copied");
      }, 1200);
    });
    return;
  }

  const downloadBtn = e.target.closest(".download-btn");
  if(downloadBtn){
    downloadFile(downloadBtn.getAttribute("data-url"), downloadBtn.getAttribute("data-filename"));
    return;
  }

  const brandHome = e.target.closest(".brand-home");
  if(brandHome){
    transitionTo(app => renderHome(app));
    return;
  }

  const mainBtn = e.target.closest(".main-btn");
  if(mainBtn){
    const main = mainBtn.dataset.main;
    transitionTo(app => renderCategory(app, main));
    return;
  }

  const subBtn = e.target.closest(".sub-btn");
  if(subBtn){
    const { main, sub } = subBtn.dataset;
    transitionTo(app => renderGrid(app, main, sub));
    return;
  }

  const backBtn = e.target.closest(".back-btn");
  if(backBtn){
    if(backBtn.dataset.action === "home"){
      transitionTo(app => renderHome(app));
    }else if(backBtn.dataset.action === "category"){
      transitionTo(app => renderCategory(app, backBtn.dataset.main));
    }
    return;
  }
});

(async function init(){
  const app = document.getElementById("app");
  const status = document.getElementById("status");

  if(CONFIG.repo === "YOUR_REPO_NAME"){
    status.textContent = "set CONFIG.repo at the top of the script";
    status.classList.add("status-error");
    return;
  }

  try{
    const files = await fetchFlatFileList();
    state.tree = buildTree(files);
    renderHome(app);
  }catch(e){
    status.textContent = "failed to load repo contents, check console";
    status.classList.add("status-error");
    console.error(e);
  }
})();
</script>

</body>
</html>
