<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Great Things</title><link rel="icon" href="favicon.png" type="image/png"><style>
*{margin:0;box-sizing:border-box}body{background:#08070f;overflow:hidden;color:#fff}
canvas{position:fixed;inset:0}.corner{position:fixed;width:340px;height:340px;border-radius:50%}.tl{top:-120px;left:-120px;background:radial-gradient(circle,rgba(180,160,255,.18),transparent 70%)}.tr{top:-120px;right:-120px;background:radial-gradient(circle,rgba(180,160,255,.18),transparent 70%)}.bl{bottom:-120px;left:-120px;background:radial-gradient(circle,rgba(180,160,255,.18),transparent 70%)}.br{bottom:-120px;right:-120px;background:radial-gradient(circle,rgba(180,160,255,.18),transparent 70%)}
.wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.card{display:flex;gap:16px;align-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(15px);padding:18px;border-radius:18px}
img{width:72px;height:72px;border-radius:50%}.badge{display:none;background:#ffffff22;padding:4px 8px;border-radius:8px;font-size:.8rem}#spotify,#game{display:none;margin-top:8px;font-size:.9rem}h1{font:400 clamp(18px,3vw,42px) Georgia,serif}
</style></head><body><canvas id=c></canvas><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div><div class=wrap><div class=card onclick="window.open('https://discord.com/users/1077273311211434105','_blank')" style="cursor:pointer"><img id=pfp><div><div><b id=user>Loading...</b> <span id=badge class=badge></span></div><div id=status></div><div id=spotify></div><div id=game></div></div></div><h1>We're going to make great things together</h1></div><script>
async function u(){let r=await fetch("https://api.lanyard.rest/v1/users/1077273311211434105"),d=(await r.json()).data;
pfp.src=`https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png?size=256`;
user.textContent=d.discord_user.display_name||d.discord_user.username;status.textContent=d.discord_status;
let c=d.activities.find(a=>a.type==4);badge.style.display="none";if(c){badge.style.display="inline";badge.textContent=(c.emoji?c.emoji.name+" ":"")+(c.state||"")}
spotify.style.display="none";if(d.spotify){spotify.style.display="block";spotify.textContent="🎵 "+d.spotify.song+" — "+d.spotify.artist}
game.style.display="none";let g=d.activities.find(a=>a.type==0);if(g){game.style.display="block";game.textContent="🎮 "+g.name+" • "+(g.details||g.state||"Running")}}
u();setInterval(u,15000);
const cv=c,x=cv.getContext('2d');let W,H,D=[];function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;D=[...Array(220)].map(()=>({x:Math.random()*W,y:Math.random()*H,b:0,r:Math.random()*1.5+.4,s:Math.random()*.004+.002,a:Math.random()*28+10,p:Math.random()*6.28,m:(Math.random()-.5)*.12,o:Math.random()*.45+.08}));D.forEach(e=>e.b=e.y)}onresize=rs;rs();let t=0;(function f(){x.fillStyle="#08070f";x.fillRect(0,0,W,H);t+=.012;for(let d of D){d.x+=d.m;if(d.x>W)d.x=0;if(d.x<0)d.x=W;let y=d.b+Math.sin(t*d.s*80+d.p+d.x*.012)*d.a;x.beginPath();x.arc(d.x,y,d.r,0,7);x.fillStyle=`rgba(220,215,255,${d.o})`;x.fill()}requestAnimationFrame(f)})();
</script></body></html>
