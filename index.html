<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WLNG</title>
<link rel="icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta property="og:title" content="WLNG">
<meta property="og:description" content="WeLoveNekoGirls, a collection of gifs and pfp of cute anime girls with animal ears and cute tails.">
<meta property="og:image" content="https://archeville.github.io/WLNG/favicon.png">
<meta property="og:type" content="website">
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:title" content="WLNG">
<meta property="twitter:description" content="WeLoveNekoGirls, a collection of gifs and pfp of cute anime girls with animal ears and cute tails.">
<meta property="twitter:image" content="https://archeville.github.io/WLNG/favicon.png">

<style>
:root{
  --bg:#101014;
  --panel:#1b1b23;
  --panel2:#212230;
  --border:#2e2e3a;
  --text:#eae8f0;
  --muted:#8d8a98;
  --accent:#b89bff;
  --accent-soft:rgba(184,155,255,.16);
  --pink:#ff9fc0;
  --pink-soft:rgba(255,159,192,.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding-bottom:80px;
  position:relative;
  overflow-x:hidden;
}
h1,h2,.brand,.copy-btn,.download-btn,.back-btn,.main-btn-label,.sub-btn-label{font-family:'Space Grotesk',sans-serif;}

.bg-layer{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
  background-size:26px 26px;
  background-position:-10px -10px;
}
.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(90px);
  z-index:-1;
  pointer-events:none;
  opacity:.35;
}
.glow-a{
  width:520px;height:520px;
  top:-160px;left:-120px;
  background:var(--accent);
  animation:drift-a 22s ease-in-out infinite alternate;
}
.glow-b{
  width:460px;height:460px;
  bottom:-180px;right:-100px;
  background:var(--pink);
  opacity:.22;
  animation:drift-b 26s ease-in-out infinite alternate;
}
@keyframes drift-a{
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(60px,40px) scale(1.1);}
}
@keyframes drift-b{
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(-50px,-30px) scale(1.08);}
}

.discord-btn{
  position:fixed;
  top:18px;
  right:18px;
  z-index:200;
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  padding:9px 16px 9px 12px;
  border-radius:999px;
  transition:all .25s ease;
  box-shadow:0 4px 14px rgba(0,0,0,.35);
}
.discord-btn:hover{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent-soft), 0 8px 22px rgba(184,155,255,.2);
  transform:translateY(-1px);
}
.discord-btn svg{width:18px;height:18px;fill:var(--accent);}

.brand-home{
  position:fixed;
  top:18px;
  left:18px;
  z-index:200;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:18px;
  font-weight:700;
  letter-spacing:.5px;
  cursor:pointer;
  user-select:none;
  background:var(--panel2);
  border:1px solid var(--border);
  padding:9px 18px 9px 14px;
  border-radius:999px;
  transition:all .25s ease;
  box-shadow:0 4px 14px rgba(0,0,0,.35);
}
.brand-home .dot{
  width:8px;height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 10px var(--accent);
}
.brand-home span{color:var(--accent);}
.brand-home:hover{border-color:var(--accent);transform:translateY(-1px);}

main{
  max-width:1100px;
  margin:0 auto;
  padding:100px 6vw 0;
}

#app{transition:opacity .22s ease, transform .22s ease;}
#app.leaving{opacity:0;transform:translateY(10px);}

#status{
  padding:60px 0;
  text-align:center;
  color:var(--muted);
  font-size:13px;
  letter-spacing:.5px;
}
.status-error{color:var(--pink);}

.loader-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:160px;
}
.loader{display:flex;gap:9px;}
.loader span{
  width:10px;height:10px;
  border-radius:50%;
  background:var(--accent);
  opacity:.3;
  animation:pulse 1.1s infinite ease-in-out;
}
.loader span:nth-child(2){animation-delay:.15s;}
.loader span:nth-child(3){animation-delay:.3s;}
@keyframes pulse{
  0%,80%,100%{opacity:.25;transform:scale(.8);}
  40%{opacity:1;transform:scale(1.15);}
}

.reveal{opacity:0;transform:translateY(16px);transition:opacity .45s ease, transform .45s ease;}
.reveal.in{opacity:1;transform:translateY(0);}

.home-screen{
  display:flex;
  gap:28px;
  justify-content:center;
  align-items:center;
  min-height:62vh;
  flex-wrap:wrap;
}
.main-btn{
  width:250px;
  height:250px;
  background:linear-gradient(160deg, var(--panel), #17171e);
  border:1px solid var(--border);
  border-radius:26px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  transition:border-color .25s ease, box-shadow .25s ease, transform .25s ease, opacity .45s ease;
  position:relative;
  overflow:hidden;
}
.main-btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 0%, var(--accent-soft), transparent 65%);
  opacity:0;
  transition:opacity .3s ease;
}
.main-btn:hover{
  border-color:var(--accent);
  box-shadow:0 16px 36px rgba(0,0,0,.45), 0 0 0 1px var(--accent-soft);
  transform:translateY(-5px) scale(1.02);
}
.main-btn:hover::before{opacity:1;}
.main-btn-icon{width:42px;height:42px;color:var(--accent);position:relative;z-index:1;}
.main-btn-label{font-size:22px;font-weight:700;color:var(--text);letter-spacing:1px;position:relative;z-index:1;}

.view-wrap{padding:0 0 40px;}
.back-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--muted);
  font-size:13px;
  font-weight:600;
  padding:9px 16px;
  border-radius:999px;
  cursor:pointer;
  margin-bottom:22px;
  transition:all .2s ease;
}
.back-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}

.view-title{font-size:25px;font-weight:600;margin-bottom:24px;letter-spacing:.3px;}

.category-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
  gap:16px;
}
.sub-btn{
  background:linear-gradient(160deg, var(--panel), #17171e);
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 16px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  transition:border-color .25s ease, box-shadow .25s ease, transform .25s ease, opacity .45s ease;
}
.sub-btn:hover{
  border-color:var(--accent);
  box-shadow:0 14px 30px rgba(0,0,0,.4), 0 0 0 1px var(--accent-soft);
  transform:translateY(-3px);
}
.sub-btn-label{font-size:15px;font-weight:600;color:var(--text);}
.sub-btn-count{
  font-size:11px;
  color:var(--muted);
  background:var(--panel2);
  padding:2px 10px;
  border-radius:999px;
  border:1px solid var(--border);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:18px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  transition:opacity .45s ease, transform .45s ease, box-shadow .25s ease, border-color .25s ease;
}
.card:hover{
  transform:translateY(-4px) scale(1.015);
  border-color:var(--accent);
  box-shadow:0 16px 34px rgba(0,0,0,.45), 0 0 0 1px var(--accent-soft);
}

.embed-wrap{
  width:100%;
  aspect-ratio:1/1;
  background:linear-gradient(145deg, #1d1d27, #15151b);
  overflow:hidden;
}
.embed-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform .4s ease;
}
.card:hover .embed-wrap img{transform:scale(1.06);}

.card-body{
  padding:13px 14px 15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.media-name{
  font-size:13px;
  color:var(--text);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.btn-row{display:flex;gap:8px;}

.copy-btn, .download-btn{
  flex:1;
  font-size:11px;
  font-weight:600;
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--border);
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
  transition:all .2s ease;
}
.copy-btn:hover, .download-btn:hover{
  border-color:var(--accent);
  background:var(--accent-soft);
  color:var(--accent);
}
.copy-btn.copied{
  border-color:var(--pink);
  color:var(--pink);
  background:var(--pink-soft);
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="glow glow-a"></div>
<div class="glow glow-b"></div>

<a class="discord-btn" href="https://discord.gg/your-invite" target="_blank" rel="noopener">
<svg viewBox="0 0 24 24"><path d="M20.317 4.369A19.791 19.791 0 0016.558 3c-.21.375-.444.875-.608 1.273a18.27 18.27 0 00-7.9 0C7.886 3.875 7.65 3.375 7.44 3a19.736 19.736 0 00-3.76 1.37C1.5 8.03.9 11.6 1.2 15.117a19.9 19.9 0 006.073 3.075c.49-.67.927-1.382 1.304-2.13-.717-.27-1.404-.6-2.054-.984.172-.126.34-.258.503-.395a14.16 14.16 0 0012.04 0c.164.137.331.27.503.395-.65.385-1.337.715-2.054.985a16.5 16.5 0 001.304 2.13 19.83 19.83 0 006.077-3.076c.36-4.08-.61-7.61-2.58-10.748zM8.68 13.33c-.83 0-1.51-.77-1.51-1.72 0-.95.665-1.72 1.51-1.72.853 0 1.526.78 1.51 1.72 0 .95-.657 1.72-1.51 1.72zm6.64 0c-.83 0-1.51-.77-1.51-1.72 0-.95.665-1.72 1.51-1.72.853 0 1.526.78 1.51 1.72 0 .95-.65 1.72-1.51 1.72z"/></svg>
Discord
</a>

<div class="brand-home" data-action="home-brand">
  <span class="dot"></span>
  WLNG<span>.</span>
</div>

<main>
  <div id="app">
    <div class="loader-wrap"><div class="loader"><span></span><span></span><span></span></div></div>
  </div>
</main>

<script>
const CONFIG = {
  owner: "archeville",
  repo: "WLNG",
  branch: "main"
};

const ICONS = {
  gif: `<svg class="main-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M9 9.5v5M14 9.5h-2.2c-.7 0-1.3.6-1.3 1.3v0c0 .7.6 1.3 1.3 1.3H13M17 9.5h-2.5v5M17 12h-2"/></svg>`,
  pfp: `<svg class="main-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="9" cy="10" r="2.2"/><path d="M5 19l4.5-5 3 3.2L16 13l3 4.5"/></svg>`
};

function apiUrl(path){
  const encoded = path.split("/").map(encodeURIComponent).join("/");
  return `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${encoded}?ref=${CONFIG.branch}`;
}

async function fetchDir(path){
  const res = await fetch(apiUrl(path), { headers: { Accept: "application/vnd.github+json" } });
  if(!res.ok) throw new Error(`${res.status} fetching ${path}`);
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function titleize(str){
  return String(str).replace(/\.[a-zA-Z0-9]+$/,"").replace(/[-_]+/g," ").trim().replace(/\b\w/g, c => c.toUpperCase());
}

async function downloadFile(url, filename){
  try{
    const res = await fetch(url);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(blobUrl);
  }catch(e){
    console.error("download failed", e);
    window.open(url, "_blank");
  }
}

function revealStagger(elements){
  elements.forEach((el, i) => {
    el.style.transitionDelay = `${Math.min(i * 40, 400)}ms`;
  });
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      elements.forEach(el => el.classList.add("in"));
    });
  });
}

function transitionTo(renderFn){
  const app = document.getElementById("app");
  app.classList.add("leaving");
  setTimeout(() => {
    app.innerHTML = "";
    renderFn(app);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => app.classList.remove("leaving"));
    });
  }, 220);
}

function extFor(main){
  return main === "gif" ? /\.gif$/i : /\.png$/i;
}

function renderHome(app){
  app.innerHTML = `
    <div class="home-screen">
      <button class="main-btn reveal" data-main="gif">
        ${ICONS.gif}
        <span class="main-btn-label">Gifs</span>
      </button>
      <button class="main-btn reveal" data-main="pfp">
        ${ICONS.pfp}
        <span class="main-btn-label">Pfp</span>
      </button>
    </div>
  `;
  revealStagger([...app.querySelectorAll(".reveal")]);
}

async function renderCategory(app, main){
  const title = main === "gif" ? "Gifs" : "Pfp";
  const wrap = document.createElement("div");
  wrap.className = "view-wrap";
  wrap.innerHTML = `
    <button class="back-btn" data-action="home">&larr; Home</button>
    <h2 class="view-title">${title}</h2>
    <div class="loader-wrap"><div class="loader"><span></span><span></span><span></span></div></div>
  `;
  app.appendChild(wrap);

  let entries;
  try{
    entries = await fetchDir(main);
  }catch(e){
    console.error(`could not read ${main}`, e);
    return;
  }

  const dirs = entries.filter(e => e.type === "dir");
  const grid = document.createElement("div");
  grid.className = "category-grid";

  dirs.forEach(dir => {
    const btn = document.createElement("button");
    btn.className = "sub-btn reveal";
    btn.dataset.main = main;
    btn.dataset.sub = dir.name;
    btn.innerHTML = `<span class="sub-btn-label">${escapeHtml(titleize(dir.name))}</span>`;
    grid.appendChild(btn);
  });

  wrap.querySelector(".loader-wrap").replaceWith(grid);
  revealStagger([...grid.children]);
}

function makeMediaCard(filename, src){
  const card = document.createElement("div");
  card.className = "card reveal";
  const caption = titleize(filename);
  card.innerHTML = `
    <div class="embed-wrap">
      <img src="${escapeHtml(src)}" loading="lazy" alt="${escapeHtml(caption)}">
    </div>
    <div class="card-body">
      <span class="media-name">${escapeHtml(caption)}</span>
      <div class="btn-row">
        <button class="copy-btn" data-copy="${escapeHtml(src)}">Copy</button>
        <button class="download-btn" data-url="${escapeHtml(src)}" data-filename="${escapeHtml(filename)}">Download</button>
      </div>
    </div>
  `;
  return card;
}

async function renderGrid(app, main, sub){
  const wrap = document.createElement("div");
  wrap.className = "view-wrap";
  wrap.innerHTML = `
    <button class="back-btn" data-action="category" data-main="${main}">&larr; ${main === "gif" ? "Gifs" : "Pfp"}</button>
    <h2 class="view-title">${escapeHtml(titleize(sub))}</h2>
    <div class="loader-wrap"><div class="loader"><span></span><span></span><span></span></div></div>
  `;
  app.appendChild(wrap);

  let entries;
  try{
    entries = await fetchDir(`${main}/${sub}`);
  }catch(e){
    console.error(`could not read ${main}/${sub}`, e);
    return;
  }

  const ext = extFor(main);
  const files = entries.filter(e => e.type === "file" && ext.test(e.name));
  const grid = document.createElement("div");
  grid.className = "grid";

  files.forEach(file => {
    grid.appendChild(makeMediaCard(file.name, file.download_url));
  });

  wrap.querySelector(".loader-wrap").replaceWith(grid);
  revealStagger([...grid.children]);
}

document.addEventListener("click", (e) => {
  const copyBtn = e.target.closest(".copy-btn");
  if(copyBtn){
    const value = copyBtn.getAttribute("data-copy");
    navigator.clipboard.writeText(value).then(() => {
      const original = copyBtn.textContent;
      copyBtn.textContent = "Copied";
      copyBtn.classList.add("copied");
      setTimeout(() => {
        copyBtn.textContent = original;
        copyBtn.classList.remove("copied");
      }, 1200);
    });
    return;
  }

  const downloadBtn = e.target.closest(".download-btn");
  if(downloadBtn){
    downloadFile(downloadBtn.getAttribute("data-url"), downloadBtn.getAttribute("data-filename"));
    return;
  }

  const brandHome = e.target.closest(".brand-home");
  if(brandHome){
    transitionTo(app => renderHome(app));
    return;
  }

  const mainBtn = e.target.closest(".main-btn");
  if(mainBtn){
    const main = mainBtn.dataset.main;
    transitionTo(app => renderCategory(app, main));
    return;
  }

  const subBtn = e.target.closest(".sub-btn");
  if(subBtn){
    const { main, sub } = subBtn.dataset;
    transitionTo(app => renderGrid(app, main, sub));
    return;
  }

  const backBtn = e.target.closest(".back-btn");
  if(backBtn){
    if(backBtn.dataset.action === "home"){
      transitionTo(app => renderHome(app));
    }else if(backBtn.dataset.action === "category"){
      transitionTo(app => renderCategory(app, backBtn.dataset.main));
    }
    return;
  }
});

(function init(){
  const app = document.getElementById("app");

  if(CONFIG.repo === "YOUR_REPO_NAME"){
    app.innerHTML = `<div id="status" class="status-error">set CONFIG.repo at the top of the script</div>`;
    return;
  }

  renderHome(app);
})();
</script>

</body>
</html>
